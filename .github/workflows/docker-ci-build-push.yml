# ============================================================
# 🚀 CI/CD – Backend ML Events Service (Docker → Railway)
# ============================================================

name: 🚀 CI/CD – Backend ML Events Service (Docker → Railway)

on:
  push:
    branches:
      - main

  workflow_dispatch:

  # Daily at 4:00 AM IST (22:30 UTC)
  schedule:
    - cron: "30 22 * * *"

jobs:
  ci-cd-backend-ml-events:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: pythoncodelife/backend-ml-events-service
      IMAGE_TAG: latest
      LIVE_URL: https://backend-ml-events-service-production.up.railway.app/

    steps:

      # =====================================================
      # CHECKOUT
      # =====================================================
      - name: 🧾 Checkout source code
        uses: actions/checkout@v4

      # =====================================================
      # BUILD TIMESTAMPS
      # =====================================================
      - name: ⏱️ Generate build timestamps (UTC + IST)
        run: |
          echo "BUILD_TIME_UTC=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          echo "BUILD_TIME_IST=$(TZ=Asia/Kolkata date '+%Y-%m-%d %I:%M:%S %p IST')" >> $GITHUB_ENV

      # =====================================================
      # DOCKER SETUP
      # =====================================================
      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =====================================================
      # BUILD & PUSH IMAGE
      # =====================================================
      - name: 🏗️ Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      # =====================================================
      # DEPLOY TO RAILWAY
      # =====================================================
      - name: 🚀 Deploy to Railway
        run: |
          curl -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "query": "mutation { serviceInstanceDeploy(serviceId: \"'${{ secrets.RAILWAY_ML_EVENTS_SERVICE_ID }}'\") }"
            }'

      # =====================================================
      # SUCCESS EMAIL
      # =====================================================
      - name: 📧 Deployment Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚀 Deployment Success | Backend ML Events Service"
          html_body: |
            <h2>🚀 Backend ML Events Service is LIVE</h2>
            <table border="1" cellpadding="8">
              <tr><td><b>Service</b></td><td>Backend ML Events Service</td></tr>
              <tr><td><b>Platform</b></td><td>Railway</td></tr>
              <tr><td><b>Live URL</b></td>
                  <td><a href="${{ env.LIVE_URL }}">${{ env.LIVE_URL }}</a></td></tr>
              <tr><td><b>Docker Image</b></td><td>${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}</td></tr>
              <tr><td><b>UTC Deploy Time</b></td><td>${{ env.BUILD_TIME_UTC }}</td></tr>
              <tr><td><b>IST Deploy Time</b></td><td>${{ env.BUILD_TIME_IST }}</td></tr>
              <tr><td><b>Status</b></td><td style="color:green;"><b>LIVE</b></td></tr>
            </table>
          to: ${{ secrets.MAIL_TO }}
          cc: ${{ secrets.MAIL_CC }}
          from: ${{ secrets.MAIL_USERNAME }}

      # =====================================================
      # FAILURE EMAIL
      # =====================================================
      - name: ❌ CI/CD Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ CI/CD Failed | Backend ML Events Service"
          html_body: |
            <h2 style="color:red;">❌ Pipeline Failed</h2>
            <table border="1" cellpadding="8">
              <tr><td><b>Service</b></td><td>Backend ML Events Service</td></tr>
              <tr><td><b>UTC Time</b></td><td>${{ env.BUILD_TIME_UTC }}</td></tr>
              <tr><td><b>IST Time</b></td><td>${{ env.BUILD_TIME_IST }}</td></tr>
              <tr><td><b>Live URL</b></td>
                  <td><a href="${{ env.LIVE_URL }}">${{ env.LIVE_URL }}</a></td></tr>
              <tr><td><b>Status</b></td><td style="color:red;"><b>FAILED</b></td></tr>
            </table>
          to: ${{ secrets.MAIL_TO }}
          cc: ${{ secrets.MAIL_CC }}
          from: ${{ secrets.MAIL_USERNAME }}
