name: 🚀 Build & Push backend-ml-events-service Image (Manual)

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      # Step 1: Checkout
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Docker Login ✅ FIXED
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Build
      - name: 🐳 Build Docker Image
        run: |
          docker build -t pythoncodelife/backend-ml-events-service:latest .

      # Step 4: Push
      - name: 📤 Push Docker Image
        run: |
          docker push pythoncodelife/backend-ml-events-service:latest

      # Step 5: Info
      - name: ℹ️ Done
        run: |
          echo "✅ Image pushed successfully"
